<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — TCG Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('auth.login') }}" class="nav-brand"><span class="nav-brand-icon">🃏</span> TCG Scanner</a>
    <div class="nav-links"><a href="{{ url_for('auth.login') }}">Login</a></div>
  </nav>
  <div class="auth-wrapper">
    <div class="auth-card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}{% endif %}
      {% endwith %}
      <div class="auth-logo">✦</div>
      <h1>Create account</h1>
      <p class="auth-subtitle">Start building your card collection</p>
      <form method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="pick a username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Create account</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
  </div>
</body>
</html>
